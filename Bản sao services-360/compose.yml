services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: residential_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db
      - minio
    networks:
      - residential_network
    environment:
      DB_HOST: db
      DB_PORT: 5432

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: residential_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - app
      - db
    networks:
      - residential_network
    environment:
      DB_HOST: db
      DB_PORT: 5432
    command: php artisan schedule:work

  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: residential_queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - app
      - db
    networks:
      - residential_network
    environment:
      DB_HOST: db
      DB_PORT: 5432
    command: php artisan queue:work --tries=3 --timeout=60 --sleep=1

  nginx:
    image: nginx:alpine
    container_name: residential_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - residential_network

  db:
    image: postgres:16-alpine
    container_name: residential_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: residential_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54323:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - residential_network

  minio:
    image: minio/minio
    container_name: residential_minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    networks:
      - residential_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: residential_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - residential_network
    depends_on:
      - nginx

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local

networks:
  residential_network:
    driver: bridge
