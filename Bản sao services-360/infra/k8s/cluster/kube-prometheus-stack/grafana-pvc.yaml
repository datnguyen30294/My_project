# PVC cho Grafana — phải tồn tại trước khi pod monitoring-grafana schedule.
# Bình thường chart kube-prometheus-stack tự tạo qua values.yaml (grafana.persistence).
# File này dùng để khôi phục thủ công khi PVC bị xoá nhầm mà không muốn rerun helm upgrade.
# Spec phải khớp grafana.persistence trong values.yaml: longhorn, RWO, 5Gi.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: monitoring-grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/instance: monitoring
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: grafana
    app.kubernetes.io/version: 12.4.3
    helm.sh/chart: grafana-11.6.1
  annotations:
    meta.helm.sh/release-name: monitoring
    meta.helm.sh/release-namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: longhorn
