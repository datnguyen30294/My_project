apiVersion: apps/v1
kind: Deployment
metadata:
  name: queue-worker
  namespace: residential-management-prod
  labels:
    app.kubernetes.io/name: residential-management
    app.kubernetes.io/component: queue-worker
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: residential-management
      app.kubernetes.io/component: queue-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: residential-management
        app.kubernetes.io/component: queue-worker
    spec:
      imagePullSecrets:
        - name: dockerhub-credentials
      containers:
        - name: queue-worker
          image: ${REGISTRY_IMAGE}:backend-latest
          imagePullPolicy: Always
          command: ["sh", "-c", "php artisan schedule:work & php artisan queue:work --sleep=3 --tries=3 --max-time=3600"]
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
