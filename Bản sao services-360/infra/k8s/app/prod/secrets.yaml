apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: residential-management-prod
type: Opaque
stringData:
  APP_KEY: ${APP_KEY}
  DB_PASSWORD: ${DB_PASSWORD}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  AWS_ENDPOINT: ${AWS_ENDPOINT}
  MAIL_USERNAME: ${MAIL_USERNAME}
  MAIL_PASSWORD: ${MAIL_PASSWORD}
  # S2S raw token gửi cho resi_mart (Bearer). resi_mart lưu sha256 của giá trị này
  # ở INTERNAL_TOKEN_RESIDENTIAL_HASH (namespace resi-mart-prod). Hai bên PHẢI khớp.
  RESI_MART_INTERNAL_TOKEN: ${RESI_MART_INTERNAL_TOKEN}
  # Password của cross-DB connection read-only vào Postgres resi_mart (đọc đơn hàng
  # vendor). Khớp với DB_PASSWORD của namespace resi-mart-prod (user resi_mart_user).
  RESIMART_DB_PASSWORD: ${RESIMART_DB_PASSWORD}
